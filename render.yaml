# Render Blueprint for PI Coach. In Render: New → Blueprint → pick this repo.
# Secrets are NOT in this file (sync: false) — set them in the dashboard so they
# never land in git. Swap `plan: starter` ($7/mo, always warm) when you outgrow
# the free tier's cold starts.
services:
  - type: web
    name: pi-coach
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # set in dashboard (secret)
      - key: TRANSCRIPTION_API_KEY
        sync: false # set in dashboard (secret)
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: DAILY_REQUEST_CAP
        value: "500" # app-level wallet guard; tune to your provider spend caps
      - key: RATE_LIMIT_PER_MIN
        value: "20"
      - key: POSTHOG_KEY
        sync: false # public PostHog project key; optional, served via /api/config
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: RESEND_API_KEY
        sync: false # secret; enables emailing each feedback submission
      - key: FEEDBACK_EMAIL_TO
        value: tannavr898@gmail.com
